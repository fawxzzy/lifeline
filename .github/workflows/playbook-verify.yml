name: Playbook Smoke

on:
  workflow_dispatch:

env:
  NPM_CONFIG_OPTIONAL: "true"
  PNPM_CONFIG_OPTIONAL: "true"

jobs:
  playbook-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10.6.5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify esbuild optional package resolution
        run: pnpm ci:verify:esbuild

      - run: pnpm build

      - name: Smoke preflight
        run: node scripts/lib/ensure-built.mjs

      # Canonical Playbook verification path in this repo: resolve+merge smoke checks.
      - run: node scripts/smoke-suite-runner.mjs playbook
